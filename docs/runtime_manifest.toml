[assumption."Runtime_Prims_refines"]
statement    = "for all prim p and args, rval_of_dval (apply_prim p (map dval_of_rval args)) = Prims.prim_<name> args"
reference    = "EffIR.apply_prim (the TOTAL reference definition; DNone/DSome option-encoded)"
fast         = "Prims.prim_* realizers in runtime/prims.ml; written from Rocq definitions, same DP order"
validated_by = ["diff_prims (3000 pipeline states, G1-G16 grammar-violation classes, coverage asserted; plus 2000-round direct apply_prim-vs-realizer pass over ALL 15 prims: boundaries incl. -1 * int64_min, negative-dividend floor division and divisor 0, shape mismatches, beyond-native-int offsets/indices; R12 case folds EXHAUSTIVE over all 256 single bytes with the spec value asserted, NUL-embedded/empty/no-input-mutation checks, plus sample_ci_dispatch through the reference-vs-generated pipeline, C1-C5 coverage asserted)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Journal"]
ocaml_module = "Rkv.Journal"
ops          = ["Append"]
backend      = "Effect.Deep handler appending (now_ms, Rval.t) to a per-run buffer (newest-first; contents reverses to chronological) + optional per-entry sink callback (unit if absent); the timestamp is read from the SAME injectable source instance as the Time and Store handlers (Runtime.with_store_time_and_journal, one source — R9, adr-0013)"
entry_type   = "(Z ms, Rval.t) — entries within one run share the run's single instant (adr-0011)"
tests        = ["diff_journal"]
owner        = "yann"

[assumption."Runtime_Journal_refines"]
statement    = "Journal.contents (buffer) = the chronological reference journal (timestamps = the run's instant, entries in program order), and the sink saw exactly the buffer's entries in order. PROVEN claims stop at \"the buffer equals the reference journal\" (differentially tested); everything sink-onward (disk bytes, crash atomicity, fsync) is named consumer trust — the manifest entry says so explicitly, and no rocqeteer text may claim journal durability (adr-0013 §Decision 4)"
reference    = "EffIR.world.journal (newest-first; OJournal appends (now_ms, eval v); observe_full reverses). Write-only by construction: the GENERAL frame law run_journal_frame (theories/Journal.v) proves outcome and non-journal observables independent of the prior journal; the read-back mutant is rejected there"
fast         = "Rkv.Journal (Effect.Deep, buffer + ?sink, source-shared timestamps); codegen lowers OJournal -> Journal.append"
validated_by = ["diff_journal (300 rounds x 3 programs x 2 instants; J1-J9: empty/mixed/nested/large contexts, order under Repeat AND Fold bodies, error short-circuit keeps exactly the pre-throw entries, empty runs, sink==buffer, timestamps = run instant at two instants; coverage asserted)"]
review_label = "tcb-assumption"
owner        = "yann"

[assumption."Runtime_Fold_refines"]
statement    = "Fold lst init body lowers to a native List.fold_left with binders [acc; elem] = de Bruijn [0; 1]; observe(fast) = observe(reference) on outcome (incl. OErr payload), live store, and trace — order, error short-circuit, and the non-list empty-fold posture included"
reference    = "EffIR.run's Fold case (left-to-right nested fix over the DList; adr-0012-list-elimination); proven in theories/Fold.v (fold-right mutant rejected)"
fast         = "codegen Fold lowering (codegen.ml): let-bound init, match on Rval.List, List.fold_left; Err.throw aborts mid-list natively"
validated_by = ["diff_fold (400 rounds x 5 programs; F1-F8: empty/singleton/large-1000+/mixed lists, error mid-fold, acc overflow via PAddChecked, non-list scrutinee, order asserted via trace; coverage asserted)"]
review_label = "tcb-assumption"
owner        = "yann"

# The refinement assumption is documented here (NOT declared as a Rocq Axiom), so the Rocq
# development stays axiom-free (Print Assumptions incr_correct = "Closed under the global
# context"). It is validated by the adversarial differential tests below.
[assumption."Runtime_KV_refines"]
statement    = "for all initial store states (deadlines included) and every instant now, observe(fast(p)) = observe(reference(p)) — outcome and LIVE (key, value, deadline) bindings, expired filtered on both sides"
reference    = "EffIR.run over the string-keyed FMapAVL store; handle_store + live (now <= d); live_elements filter"
fast         = "generated code under Runtime.with_store_and_time (Time ∘ Kv.run ~now:source, one source)"
observable   = "sorted (bytes key, (Rval.t, deadline option)) LIVE bindings, string<->bytes bridged"
validated_by = ["diff_test", "diff_kv (5000 adversarial cases, T2/T4/T5/T7 covered)", "diff_store (3000 states, deadline boundaries d-1/d/d+1 per key, key collisions incl. NUL and shared prefixes)"]
review_label = "tcb-assumption"
owner        = "yann"
