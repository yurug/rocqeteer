# Runtime manifest (slice 1) — every realizer and refinement assumption that crosses
# from the proven Rocq world into the trusted OCaml runtime. This is the audit surface
# of the runtime TCB (kb/spec/runtime-manifest.md, kb/architecture/decisions/adr-0004-trust-model.md).

[primitive."value_zero"]
ocaml_symbol = "Z.zero"
purity       = "pure"
raises       = []
pre          = "true"
post         = "result = 0 (reference DInt 0)"
tests        = ["diff_kv"]
owner        = "yann"

[primitive."value_succ"]
ocaml_symbol = "Z.succ"
purity       = "pure"
raises       = []
pre          = "true"
post         = "result = Z.succ x (reference: DInt (Z.succ z))"
tests        = ["diff_kv"]
owner        = "yann"

[effect."Store"]
ocaml_module = "Rkv.Kv"
ops          = ["Get", "Put", "Delete", "GetDeadline", "SetDeadline"]
backend      = "Hashtbl(bytes) of (Rval.t * deadline option) + Effect.Deep handler, one-shot continue; lazy physical deletion of expired bindings (unobservable)"
key_type     = "bytes (byte strings; reference converts list ascii -> string keys)"
value_type   = "Rval.t + optional absolute deadline (Z, ms)"
deadline_semantics = "live iff now <= d (alive AT the deadline, dead at d+1ms); (v, None) never expires; Put CLEARS the deadline; Delete returns live-removal; expired = absent for every op and for observe. Boundary validated by the 12,500-case prediction-vs-oracle run (verdis O1, 0 mismatches) and re-asserted per key at d-1/d/d+1 by diff_store; the < mutant is rejected in theories/TimeStore.v"
tests        = ["diff_test", "diff_kv", "diff_store"]
owner        = "yann"

[effect."Time"]
ocaml_module = "Rkv.Time"
ops          = ["Now"]
backend      = "Effect.Deep handler resuming with a read of an INJECTABLE source closure (unit -> Z, ms); production default wall_clock_ms = Unix.gettimeofday * 1000 truncated (unix ships with the compiler — no new opam dep); tests inject a virtual clock stepped only BETWEEN runs"
value_type   = "Z (ms since epoch; one instant per run)"
tests        = ["diff_time"]
owner        = "yann"

[assumption."Runtime_SingleTimeSource_refines"]
statement    = "store-now == time-now: the store handler and the Time handler read the SAME source instance (constructed together by Runtime.with_store_and_time, Time outermost); a test source steps only between runs, so both sides see one instant per run, matching the reference's immutable world.now_ms. Production wall clock is monotonic; cross-op drift within a run is outside the refinement statement (documented trust, adr-0011 §Decision 4)"
reference    = "EffIR.world.now_ms (immutable per run; ONow -> DInt now_ms; liveness reads it)"
fast         = "Runtime.with_store_and_time ~source: Time.run source ∘ Kv.run ~now:source"
validated_by = ["diff_time (3000 runs; reference-now == fast-source-now asserted per run)", "diff_store (3000 states; store reads flow through the same source)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Error"]
ocaml_module = "Rkv.Err"
ops          = ["Throw"]
backend      = "native exception (Runtime_error of Z) behind run_error; aborts, commits prior state"
error_type   = "Z (zarith)"
tests        = ["diff_err"]
owner        = "yann"

[assumption."Runtime_Error_refines"]
statement    = "observe(run_error (Kv.run (fast p))) = observe(reference(p)) on outcome AND state"
reference    = "EffIR.run with OErr short-circuit (throw_aborts law, sample_throw_aborts)"
fast         = "Err.throw -> Runtime_error, caught by Err.run_error"
validated_by = ["diff_err (3000 states; both throw/return paths)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Env"]
ocaml_module = "Rkv.Env"
ops          = ["Ask"]
backend      = "Effect.Deep handler resuming with the read-only context value"
ctx_type     = "Z (zarith)"
tests        = ["diff_env"]
owner        = "yann"

[assumption."Runtime_Env_refines"]
statement    = "observe(Env.run ctx (Kv.run (fast p))) = observe(reference p with run ctx)"
reference    = "EffIR.run's ctx parameter; OAsk -> ORet ctx (ask_reads_ctx, ask_ask, sample_env_lands)"
fast         = "Env.run installs ctx; Ask resumes with it"
validated_by = ["diff_env (3000 states; context lands at key 1)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Trace"]
ocaml_module = "Rkv.Trace"
ops          = ["Emit"]
backend      = "Effect.Deep handler appending to a buffer (newest-first; contents reverses)"
event_type   = "Z (zarith)"
tests        = ["diff_trace"]
owner        = "yann"

[assumption."Runtime_Trace_refines"]
statement    = "Trace.contents (Trace.run (Kv.run (fast p))) = chronological trace of reference p"
reference    = "EffIR.world.trace (newest-first), reversed by observe (sample_trace_records)"
fast         = "Trace.emit appends to a ref buffer; Trace.contents reverses"
validated_by = ["diff_trace (3000 states; log [10;20] in order)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Cache"]
ocaml_module = "Rkv.Cache"
ops          = ["CGet", "CPut"]
backend      = "Effect.Deep handler over a separate Hashtbl; never exposed by observe"
key_type     = "bytes (one key discipline across value-keyed effects since R4)"
value_type   = "Rval.t (no deadlines — memoization has no expiry semantics)"
tests        = ["diff_cache"]
owner        = "yann"

[assumption."Runtime_Cache_invisible"]
statement    = "KV observable of (Cache.run c (Kv.run (fast p))) is independent of c when c is a correct memo (hit == miss)"
reference    = "EffIR.world.cache, kept out of observe (cache_invisible; run_cache_uses_value shows the value is read)"
fast         = "Cache.get/put over a Hashtbl the handler holds"
validated_by = ["diff_cache (3000 states; reference == fast-miss == fast-hit)"]
review_label = "tcb-assumption"
owner        = "yann"

