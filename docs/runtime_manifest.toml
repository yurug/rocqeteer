# Runtime manifest (slice 1) — every realizer and refinement assumption that crosses
# from the proven Rocq world into the trusted OCaml runtime. This is the audit surface
# of the runtime TCB (kb/spec/runtime-manifest.md, kb/architecture/decisions/adr-0004-trust-model.md).

[primitive."value_zero"]
ocaml_symbol = "Z.zero"
purity       = "pure"
raises       = []
pre          = "true"
post         = "result = 0 (reference DInt 0)"
tests        = ["diff_kv"]
owner        = "yann"

[primitive."value_succ"]
ocaml_symbol = "Z.succ"
purity       = "pure"
raises       = []
pre          = "true"
post         = "result = Z.succ x (reference: DInt (Z.succ z))"
tests        = ["diff_kv"]
owner        = "yann"

[effect."KV"]
ocaml_module = "Rkv.Kv"
ops          = ["Get", "Put", "Delete"]
backend      = "Hashtbl(Z) + Effect.Deep handler, one-shot continue"
key_type     = "Z (zarith)"
value_type   = "Z (zarith)"
tests        = ["diff_test", "diff_kv"]
owner        = "yann"

[effect."Error"]
ocaml_module = "Rkv.Err"
ops          = ["Throw"]
backend      = "native exception (Runtime_error of Z) behind run_error; aborts, commits prior state"
error_type   = "Z (zarith)"
tests        = ["diff_err"]
owner        = "yann"

[assumption."Runtime_Error_refines"]
statement    = "observe(run_error (Kv.run (fast p))) = observe(reference(p)) on outcome AND state"
reference    = "EffIR.run with OErr short-circuit (throw_aborts law, sample_throw_aborts)"
fast         = "Err.throw -> Runtime_error, caught by Err.run_error"
validated_by = ["diff_err (3000 states; both throw/return paths)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Env"]
ocaml_module = "Rkv.Env"
ops          = ["Ask"]
backend      = "Effect.Deep handler resuming with the read-only context value"
ctx_type     = "Z (zarith)"
tests        = ["diff_env"]
owner        = "yann"

[assumption."Runtime_Env_refines"]
statement    = "observe(Env.run ctx (Kv.run (fast p))) = observe(reference p with run ctx)"
reference    = "EffIR.run's ctx parameter; OAsk -> ORet ctx (ask_reads_ctx, ask_ask, sample_env_lands)"
fast         = "Env.run installs ctx; Ask resumes with it"
validated_by = ["diff_env (3000 states; context lands at key 1)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Trace"]
ocaml_module = "Rkv.Trace"
ops          = ["Emit"]
backend      = "Effect.Deep handler appending to a buffer (newest-first; contents reverses)"
event_type   = "Z (zarith)"
tests        = ["diff_trace"]
owner        = "yann"

[assumption."Runtime_Trace_refines"]
statement    = "Trace.contents (Trace.run (Kv.run (fast p))) = chronological trace of reference p"
reference    = "EffIR.world.trace (newest-first), reversed by observe (sample_trace_records)"
fast         = "Trace.emit appends to a ref buffer; Trace.contents reverses"
validated_by = ["diff_trace (3000 states; log [10;20] in order)"]
review_label = "tcb-assumption"
owner        = "yann"

[effect."Cache"]
ocaml_module = "Rkv.Cache"
ops          = ["CGet", "CPut"]
backend      = "Effect.Deep handler over a separate Hashtbl; never exposed by observe"
value_type   = "Z (zarith)"
tests        = ["diff_cache"]
owner        = "yann"

[assumption."Runtime_Cache_invisible"]
statement    = "KV observable of (Cache.run c (Kv.run (fast p))) is independent of c when c is a correct memo (hit == miss)"
reference    = "EffIR.world.cache, kept out of observe (cache_invisible; run_cache_uses_value shows the value is read)"
fast         = "Cache.get/put over a Hashtbl the handler holds"
validated_by = ["diff_cache (3000 states; reference == fast-miss == fast-hit)"]
review_label = "tcb-assumption"
owner        = "yann"

[primitive."value_bytes"]
ocaml_symbol = "Rval.Bytes (Bytes.of_string ...)"
purity       = "pure"
raises       = []
pre          = "true"
post         = "result = DBytes bs (reference: VBytes bs -> DBytes bs)"
tests        = ["diff_bytes"]
owner        = "yann"

[assumption."Runtime_Bytes_refines"]
statement    = "for all byte payloads, Rval.Bytes (ascii_list_to_bytes bs) = rval_of_dval (DBytes bs)"
reference    = "EffIR.DBytes (list ascii) — ascii_list_to_bytes bridges to native bytes"
fast         = "Rval.Bytes of bytes; codegen emits \\xNN-escaped Bytes.of_string literals"
validated_by = ["diff_bytes (3000 states; B1-B7 byte classes: empty, NUL, CRLF, high, escape, large, mixed)"]
review_label = "tcb-assumption"
owner        = "yann"

[realizer."Codec"]
ocaml_module = "Rkv.Codec"
kind         = "typed witness — GADT encoder/decoder over bytes; no unsafe casts"
proven       = "theories/Codec.v: decode_encode / roundtrip (P8), axiom-free, for the reference token format"
fast         = "GADT `_ enc` to/of bytes; malformed input -> Error (T9), never a crash"
tests        = ["codec_test (5000 typed values; parse/print stability)"]
owner        = "yann"

# The refinement assumption is documented here (NOT declared as a Rocq Axiom), so the Rocq
# development stays axiom-free (Print Assumptions incr_correct = "Closed under the global
# context"). It is validated by the adversarial differential tests below.
[assumption."Runtime_KV_refines"]
statement    = "for all initial states, observe(fast(prog0)) = observe(reference(prog0))"
reference    = "EffIR.run [] prog0 (the pure FMapAVL interpreter)"
fast         = "Generated.Prog0_generated.prog0 under Rkv.Kv.run"
observable   = "sorted (key,value) bindings, coq_Z<->zarith bridged"
validated_by = ["diff_test", "diff_kv (5000 adversarial cases, T2/T4/T5/T7 covered)"]
review_label = "tcb-assumption"
owner        = "yann"
